<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Dulux Luxury Club Meet 2026</title>
    <link rel="icon" type="image/svg+xml" href="/assets/diya.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        /* Subtle golden ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(212, 175, 55, 0.06) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* Golden shimmer line at top */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.4), transparent);
            z-index: 10;
        }

        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(212, 175, 55, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.12);
            border-radius: 24px;
            padding: 48px 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6),
                        0 0 100px rgba(212, 175, 55, 0.04);
        }

        /* Dulux logo */
        .brand-logo {
            width: 160px;
            margin-bottom: 32px;
            filter: drop-shadow(0 2px 12px rgba(212, 175, 55, 0.3));
        }

        /* Decorative line below logo */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.5), transparent);
            margin: 0 auto 28px;
        }

        h1 {
            color: #d4af37;
            font-weight: 600;
            font-size: 22px;
            letter-spacing: 1px;
            margin-bottom: 28px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.35);
            font-size: 13px;
            font-weight: 300;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            line-height: 1.6;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 400;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 300;
        }

        input:focus {
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.08);
            background: rgba(255, 255, 255, 0.06);
        }

        #error {
            color: #e57373;
            font-size: 13px;
            margin-top: 10px;
            min-height: 20px;
            font-weight: 400;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 16px;
            background: linear-gradient(135deg, #d4af37, #b8962e);
            border: none;
            border-radius: 12px;
            color: #000;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.3);
            background: linear-gradient(135deg, #e0c04a, #c9a633);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button:disabled::before {
            display: none;
        }

        /* Thank you screen */
        #thankYou {
            display: none;
            text-align: center;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4af37, #b8962e);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .checkmark svg {
            width: 40px;
            height: 40px;
            stroke: #000;
            stroke-width: 3;
            fill: none;
        }

        #thankText {
            color: #d4af37;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .thank-sub {
            color: rgba(255, 255, 255, 0.35);
            font-size: 14px;
            font-weight: 300;
        }

        /* Floating golden particles */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: rgba(212, 175, 55, 0.25);
            border-radius: 50%;
            animation: drift linear infinite;
            z-index: 0;
        }

        @keyframes drift {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1); opacity: 0; }
        }

        /* Footer branding */
        .footer-line {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Subtle floating particles -->
    <script>
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 8 + 6) + 's';
            p.style.animationDelay = (Math.random() * 5) + 's';
            p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
            document.body.appendChild(p);
        }
    </script>

    <!-- Registration form -->
    <div id="formScreen" class="card">
        <img class="brand-logo" src="/assets/final-logo.png" alt="Dulux">
        <div class="divider"></div>

        <p class="subtitle">Enter your full name to join us in the<br>lamp lighting ceremony for</p>
        <h1>Dulux Luxury Club Meet 2026</h1>

        <input id="name" placeholder="Your name" autocomplete="off" autofocus maxlength="50">
        <div id="error"></div>
        <button id="submitBtn" onclick="register()">Submit</button>
    </div>

    <!-- Thank you -->
    <div id="thankYou" class="card">
        <img class="brand-logo" src="/assets/final-logo.png" alt="Dulux">
        <div class="divider"></div>
        <div class="checkmark">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div id="thankText">Thank you! 🪔</div>
        <p class="thank-sub">Your Diya will glow on the display wall</p>
    </div>

    <div class="footer-line"></div>

    <script>
        const API = window.location.origin;

        // Submit on Enter key
        document.getElementById('name').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') register();
        });

        async function register() {
            const nameInput = document.getElementById('name');
            const errorDiv = document.getElementById('error');
            const btn = document.getElementById('submitBtn');

            const name = nameInput.value.trim();
            errorDiv.innerText = '';

            // Client-side validation
            if (!name) {
                errorDiv.innerText = 'Please enter your name';
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Submitting...';

            try {
                const res = await fetch(`${API}/api/submit-name`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                const data = await res.json();

                if (data.error) {
                    errorDiv.innerText = data.error;
                    btn.disabled = false;
                    btn.innerText = 'Submit';
                } else {
                    document.getElementById('formScreen').style.display = 'none';
                    document.getElementById('thankYou').style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = 'Server error. Please try again.';
                btn.disabled = false;
                btn.innerText = 'Submit';
            }
        }
    </script>
</body>
</html>
