<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Dulux Event</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d0d18 0%, #1a0a2e 30%, #2d1b4e 60%, #1a0a2e 100%);
            overflow: hidden;
        }

        /* Animated background glow */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255, 140, 50, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, rgba(255, 80, 30, 0.06) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes bgPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(3deg); }
        }

        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4),
                        0 0 80px rgba(255, 120, 40, 0.05);
        }

        .diya-icon {
            width: 80px;
            margin-bottom: 24px;
            filter: drop-shadow(0 4px 20px rgba(255, 140, 50, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            color: #fff;
            font-weight: 600;
            font-size: 24px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            font-weight: 300;
            margin-bottom: 32px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 400;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input:focus {
            border-color: rgba(255, 140, 50, 0.5);
            box-shadow: 0 0 20px rgba(255, 140, 50, 0.1);
            background: rgba(255, 255, 255, 0.08);
        }

        #error {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 10px;
            min-height: 20px;
            font-weight: 400;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 16px;
            background: linear-gradient(135deg, #ff8c32, #ff5722);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 87, 34, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Thank you screen */
        #thankYou {
            display: none;
            text-align: center;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .checkmark svg {
            width: 40px;
            height: 40px;
            stroke: #fff;
            stroke-width: 3;
            fill: none;
        }

        #thankText {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .thank-sub {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            font-weight: 300;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: rgba(255, 140, 50, 0.3);
            border-radius: 50%;
            animation: rise linear infinite;
            z-index: 0;
        }

        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Floating particles -->
    <script>
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 6 + 4) + 's';
            p.style.animationDelay = (Math.random() * 4) + 's';
            p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
            document.body.appendChild(p);
        }
    </script>

    <!-- Registration form -->
    <div id="formScreen" class="card">
        <img class="diya-icon" src="https://cdn-icons-png.flaticon.com/512/869/869869.png" alt="Diya">

        <h1>Welcome</h1>
        <p class="subtitle">Enter your full name to light a Diya</p>

        <input id="name" placeholder="Your full name" autocomplete="off" autofocus maxlength="50">
        <div id="error"></div>
        <button id="submitBtn" onclick="register()">Submit</button>
    </div>

    <!-- Thank you -->
    <div id="thankYou" class="card">
        <div class="checkmark">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div id="thankText">Thank you! 🪔</div>
        <p class="thank-sub">Your name will appear under a Diya</p>
    </div>

    <script>
        const API = window.location.origin;

        // Submit on Enter key
        document.getElementById('name').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') register();
        });

        async function register() {
            const nameInput = document.getElementById('name');
            const errorDiv = document.getElementById('error');
            const btn = document.getElementById('submitBtn');

            const name = nameInput.value.trim();
            errorDiv.innerText = '';

            // Client-side validation
            if (!name) {
                errorDiv.innerText = 'Please enter your name';
                return;
            }
            if (name.split(' ').length < 2) {
                errorDiv.innerText = 'Please enter your full name';
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Submitting...';

            try {
                const res = await fetch(`${API}/api/submit-name`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                const data = await res.json();

                if (data.error) {
                    errorDiv.innerText = data.error;
                    btn.disabled = false;
                    btn.innerText = 'Submit';
                } else {
                    document.getElementById('formScreen').style.display = 'none';
                    document.getElementById('thankYou').style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = 'Server error. Please try again.';
                btn.disabled = false;
                btn.innerText = 'Submit';
            }
        }
    </script>
</body>
</html>
