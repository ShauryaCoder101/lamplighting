<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Flame Gradient -->
    <linearGradient id="flameGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.8"/>
      <stop offset="20%" stop-color="#FFA500"/>
      <stop offset="60%" stop-color="#FF4500"/>
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
    </linearGradient>

    <!-- Flame Core Gradient -->
    <linearGradient id="flameCore" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#FFFFE0"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>

    <!-- Clay Bowl Gradient -->
    <linearGradient id="clayGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#D2691E"/>
      <stop offset="30%" stop-color="#CD853F"/>
      <stop offset="70%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>

    <!-- Magma Oil Gradient -->
    <radialGradient id="magmaGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF59D" />
      <stop offset="40%" stop-color="#FFB300" />
      <stop offset="80%" stop-color="#FF3D00" />
      <stop offset="100%" stop-color="#212121" />
    </radialGradient>

    <!-- Glow Filter -->
    <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="4" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient Flame Glow (Behind everything) -->
  <circle cx="150" cy="110" r="60" fill="#FF8F00" opacity="0.25" filter="url(#heavyGlow)" />

  <!-- THE CLAY BOWL (Outer body) -->
  <path d="M 25 130 C 30 240, 270 240, 275 130 C 230 165, 175 165, 150 155 C 125 165, 70 165, 25 130 Z" fill="url(#clayGrad)" />

  <!-- THE OIL (Magma interior) -->
  <path d="M 25 130 C 60 95, 240 95, 275 130 C 230 165, 175 165, 150 155 C 125 165, 70 165, 25 130 Z" fill="url(#magmaGrad)" />

  <!-- Magma texture streaks (Glowing highlights inside the oil) -->
  <path d="M 70 135 Q 110 145 150 135 T 230 135" stroke="#FFF59D" stroke-width="6" stroke-linecap="round" opacity="0.7" filter="url(#softGlow)" />
  <path d="M 100 140 Q 150 150 200 140" stroke="#FFE082" stroke-width="4" stroke-linecap="round" opacity="0.8" filter="url(#softGlow)" />

  <!-- The Wick (Small dark line at flame base) -->
  <path d="M 150 155 L 150 120" stroke="#372213" stroke-width="5" stroke-linecap="round" />

  <!-- THE FLAME -->
  <!-- Outer Flame -->
  <path d="M 150 145 C 120 100, 130 50, 150 10 C 170 50, 180 100, 150 145 Z" fill="url(#flameGrad)" filter="url(#softGlow)" />
  
  <!-- Inner Intense Flame Core -->
  <path d="M 150 130 C 135 100, 140 65, 150 30 C 160 65, 165 100, 150 130 Z" fill="url(#flameCore)" />
  
  <!-- Tiny Brightest Center -->
  <ellipse cx="150" cy="115" rx="8" ry="25" fill="#FFFFFF" opacity="0.9" filter="url(#softGlow)" />

  <!-- Inner Rim Highlight (Gives 3D depth to the bowl edge) -->
  <path d="M 25 130 C 60 100, 240 100, 275 130" stroke="#FFAB91" stroke-width="2" fill="none" opacity="0.4" />
</svg>
